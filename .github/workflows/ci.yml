name: CI/CD Pipeline

on:
  push:
    branches: [ main ]  # Fix Symptom 3: Limits pushes only to the main branch
  pull_request:
    branches: [ main ]  # Allows PRs to run quality gates without deploying

jobs:
  # Parallel Code Quality & Testing Gateway
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  # Sequential Container Build & Delivery
  build-and-push:
    needs: [lint, test]
    # Fix Symptom 3: Strictly prevents delivery execution on non-main branches
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # (Removed any unmasked 'printenv' or debug commands - Fixes Symptom 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata (Git SHA Tagging)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pannalamanasa/cawassignment
          tags: |
            type=sha,format=long
            latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Fix Symptom 2: Explicitly restore cache tracking structures
          cache-from: type=gha
          cache-to: type=gha,mode=max
